<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Rounded square background tile in amber so the favicon reads as a brand mark
       at small sizes (16/32 px). White content sits on top for contrast. -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#f59e0b" />
  <!-- Three-arc gauge — same design as SkillGaugeLogo. White strokes on amber. -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
    <path d="M11 30a13 13 0 0 1 26 0" opacity="0.45" />
    <path d="M14.5 30a9.5 9.5 0 0 1 19 0" opacity="0.7" />
    <path d="M18 30a6 6 0 0 1 12 0" opacity="0.95" />
    <!-- Needle pointing up-right (high end of the gauge). -->
    <line x1="24" y1="30" x2="32" y2="18" stroke-width="3" />
  </g>
  <!-- Pivot dot at the gauge's centre. -->
  <circle cx="24" cy="30" r="2.4" fill="#ffffff" />
</svg>
